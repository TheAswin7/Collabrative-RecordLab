<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>{{TITLE}}</title>
<style>
@page{size:A4;margin:2cm}*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:11pt;color:#1a1a1a}
.header{border-bottom:2px solid #0284c7;padding-bottom:16px;margin-bottom:24px}
.header h1{font-size:18pt;font-family:Georgia,serif;color:#0369a1}
.header p{font-size:9pt;color:#64748b}
.meta{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;font-size:9pt}
.meta .label{color:#64748b;font-weight:600;text-transform:uppercase;font-size:7pt;letter-spacing:.05em}
.section{margin-bottom:20px;page-break-inside:avoid}
.section-header{background:#f0f9ff;border-left:4px solid #0284c7;padding:6px 12px;margin-bottom:8px}
.section-header h2{font-size:11pt;font-family:Georgia,serif;color:#0369a1;font-weight:700}
.section-body{padding:0 4px;line-height:1.7}
.section-body p{margin-bottom:6px}.section-body ul,.section-body ol{margin-left:20px;margin-bottom:6px}
.section-body table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:10pt}
.section-body th,.section-body td{border:1px solid #cbd5e1;padding:5px 8px}
.section-body th{background:#f1f5f9;font-weight:600}
footer{position:fixed;bottom:0;left:0;right:0;text-align:center;font-size:8pt;color:#94a3b8;padding:8px;border-top:1px solid #e2e8f0}
</style></head><body>
<header class="header">
  <h1>{{TITLE}}</h1><p>Lab Record</p>
  <div class="meta">
    <div><div class="label">Student</div><div>{{STUDENT_NAME}}</div></div>
    <div><div class="label">Experiment</div><div>{{EXPERIMENT}}</div></div>
    <div><div class="label">Date</div><div>{{DATE}}</div></div>
  </div>
</header>
{{CONTENT}}
<footer>LabRecord | Page <span style="counter-reset:page;counter-increment:page"></span></footer>
</body></html>
